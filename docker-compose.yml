# n8n + PostgreSQL + Caddy (реверс-прокси с автоматическим HTTPS)
# Инструкция по развёртыванию: README.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  n8n:
    # n8nio/n8n с Docker Hub — так работает registry-mirror, если Hub недоступен напрямую
    image: n8nio/n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- База данных ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # --- Внешний адрес ---
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL}
      # n8n стоит за одним реверс-прокси (Caddy)
      N8N_PROXY_HOPS: "1"
      # false нужен только при доступе по голому HTTP (вариант B в .env)
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      # --- Шифрование сохранённых credentials ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      # --- Часовой пояс ---
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Tashkent}
      TZ: ${GENERIC_TIMEZONE:-Asia/Tashkent}
      # --- Прочее ---
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      # Бинарные данные (файлы) хранить на диске, а не в БД
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      # Разрешить community-нодам работать инструментами AI-агентов
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      # Историю выполнений хранить 7 суток, чтобы БД не разрасталась
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
    volumes:
      - n8n_data:/home/node/.n8n
      # Папка для обмена файлами между сервером и workflow (нода Read/Write Files)
      - ./local-files:/files
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # Порты можно сменить в .env (HTTP_PORT/HTTPS_PORT), напр. для локального теста
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      N8N_SITE_ADDRESS: ${N8N_SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
    networks:
      - internal

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:

networks:
  internal:
